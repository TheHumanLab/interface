<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EXECUTE — The Human Stack</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin:0;
  font-family: Inter, system-ui, sans-serif;
  background:#0A0A0A;
  color:#EAEAEA;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.screen { display:none; max-width:480px; width:100%; padding:24px; text-align:center;}
.active { display:block; }

h1 { font-size:22px; margin-bottom:10px; }
p { opacity:0.7; font-size:14px; }

button {
  width:100%;
  padding:16px;
  margin-top:12px;
  background:#111;
  border:1px solid #2A2A2A;
  color:#EAEAEA;
  border-radius:6px;
  cursor:pointer;
}
button:hover { background:#151515; }

input {
  width:100%;
  padding:14px;
  margin-top:12px;
  background:transparent;
  border:none;
  border-bottom:1px solid #2A2A2A;
  color:#EAEAEA;
}

.box {
  border:1px solid #2A2A2A;
  padding:16px;
  margin-top:16px;
  text-align:left;
  background:#111;
}

.small { font-size:12px; opacity:0.5; margin-top:10px; }
</style>
</head>

<body>

<div id="app">

<!-- START -->
<div class="screen active" id="s0">
<h1>You need to act.</h1>
<p>We start now.</p>
<button onclick="next()">Begin</button>
</div>

<!-- FORCE ACTION -->
<div class="screen" id="s1">
<h1>Do something now</h1>
<p>Don’t think. Choose one.</p>
<button onclick="forceAction('open')">Open the thing</button>
<button onclick="forceAction('write')">Write one line</button>
<button onclick="forceAction('start')">Start for 10 seconds</button>
</div>

<!-- CONFIRM -->
<div class="screen" id="s2">
<h1>Did you start?</h1>
<button onclick="confirmStart(true)">Yes</button>
<button onclick="confirmStart(false)">No</button>
</div>

<!-- TASK -->
<div class="screen" id="s3">
<h1>What are you trying to do?</h1>
<input id="task">
<button onclick="next()">Continue</button>
</div>

<!-- FRICTION -->
<div class="screen" id="s4">
<h1>What’s stopping you?</h1>
<button onclick="setFriction('unclear')">I don’t know what to do</button>
<button onclick="setFriction('big')">It’s too big</button>
<button onclick="setFriction('avoid')">I don’t want to do it</button>
<button onclick="setFriction('distracted')">I’m distracted</button>
</div>

<!-- DETAIL -->
<div class="screen" id="s5">
<h1>Be specific</h1>
<input id="detail">
<button onclick="next()">Continue</button>
</div>

<!-- COLLAPSE -->
<div class="screen" id="s6">
<h1 id="collapsePrompt"></h1>
<input id="action">
<button onclick="next()">Commit</button>
</div>

<!-- EXECUTE -->
<div class="screen" id="s7">
<h1>You are now doing:</h1>
<h1 id="finalAction"></h1>
<button onclick="next()">Execute</button>
</div>

<!-- PROOF -->
<div class="screen" id="s8">
<h1>Did you do it?</h1>
<button onclick="proof(true)">Yes</button>
<button onclick="proof(false)">No</button>
</div>

<!-- CHANGE -->
<div class="screen" id="s9">
<h1>What changed?</h1>
<input id="change">
<button onclick="next()">Continue</button>
</div>

<!-- OUTPUT -->
<div class="screen" id="s10">
<h1>Your Execution Path</h1>
<div class="box" id="output"></div>
<button onclick="save()">Save</button>
<button onclick="next()">Continue</button>
</div>

<!-- HISTORY -->
<div class="screen" id="s11">
<h1>Your Execution History</h1>
<div id="history"></div>
<p class="small">Run this again when you stall.</p>
<button onclick="restart()">Run Again</button>
</div>

</div>

<script>
let step=0;
let friction="", task="", detail="", action="", change="";

function show(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function next(){
step++;

if(step===1) show("s1");
if(step===3) show("s3");
if(step===4) show("s4");
if(step===6) show("s6");

if(step===7){
action=document.getElementById("action").value;
document.getElementById("finalAction").innerText=action;
show("s7");
}

if(step===9) show("s9");

if(step===10){
task=document.getElementById("task").value;
detail=document.getElementById("detail").value;
change=document.getElementById("change").value;

let output=`
TASK: ${task}

FRICTION: ${friction}
DETAIL: ${detail}

ACTION: ${action}
RESULT: ${change}
`;

document.getElementById("output").innerText=output;
show("s10");
}

if(step===11){
loadHistory();
show("s11");
}
}

function forceAction(type){
show("s2");
}

function confirmStart(v){
if(!v){
alert("Start first. Then continue.");
return;
}
step=2;
show("s3");
}

function setFriction(f){
friction=f;

let prompt="";
if(f==="unclear") prompt="What is the first step?";
if(f==="big") prompt="What is the smallest version?";
if(f==="avoid") prompt="What takes under 60 seconds?";
if(f==="distracted") prompt="What do you remove?";

document.getElementById("collapsePrompt").innerText=prompt;

step=5;
show("s5");
}

function proof(v){
if(!v){
alert("Do it now. Then continue.");
return;
}
step=8;
show("s9");
}

function save(){
let existing = JSON.parse(localStorage.getItem("execute") || "[]");
existing.push(document.getElementById("output").innerText);
localStorage.setItem("execute", JSON.stringify(existing));
}

function loadHistory(){
let existing = JSON.parse(localStorage.getItem("execute") || "[]");
let container=document.getElementById("history");
container.innerHTML="";

existing.slice().reverse().forEach(e=>{
let div=document.createElement("div");
div.className="box";
div.innerText=e;
container.appendChild(div);
});
}

function restart(){
step=0;
show("s0");
}
</script>

</body>
</html>
