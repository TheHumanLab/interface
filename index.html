<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>INTERRUPT — Structural System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin:0;
  font-family: Inter, sans-serif;
  background:#0A0A0A;
  color:#EAEAEA;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.screen { display:none; max-width:480px; width:100%; padding:24px; text-align:center;}
.active { display:block; }
h1 { font-size:22px; margin-bottom:10px; }
p { opacity:0.7; font-size:14px; }

button {
  width:100%;
  padding:16px;
  margin-top:12px;
  background:#111;
  border:1px solid #2A2A2A;
  color:#EAEAEA;
  border-radius:6px;
  cursor:pointer;
}
button:hover { background:#151515; }

input {
  width:100%;
  padding:14px;
  margin-top:12px;
  background:transparent;
  border:none;
  border-bottom:1px solid #2A2A2A;
  color:#EAEAEA;
}
</style>
</head>

<body>

<div id="app">

<div class="screen active" id="s0">
<h1>You’re in a loop.</h1>
<p>This stops now.</p>
<button onclick="next()">Interrupt</button>
</div>

<div class="screen" id="s1">
<h1>What are you repeating?</h1>
<input id="loop">
<button onclick="next()">Continue</button>
</div>

<div class="screen" id="s2">
<h1>This is not thinking.</h1>
<p id="pattern"></p>
<button onclick="next()">Continue</button>
</div>

<div class="screen" id="s3">
<h1>Where is it breaking?</h1>
<button onclick="select('clarity')">I don’t know what to do</button>
<button onclick="select('execution')">I know but I’m not doing it</button>
<button onclick="select('load')">Everything feels too much</button>
</div>

<div class="screen" id="s4">
<h1 id="label"></h1>
<p id="rule"></p>
<button onclick="next()">Continue</button>
</div>

<div class="screen" id="s5">
<h1>Apply it now</h1>
<p>What is the next action?</p>
<input id="action">
<button onclick="next()">Commit</button>
</div>

<div class="screen" id="s6">
<h1 id="finalAction"></h1>
<button onclick="next()">Lock it in</button>
</div>

<div class="screen" id="s7">
<h1>Loop broken.</h1>
<p>You identified the failure and corrected it.</p>
</div>

</div>

<script>
let step=0, type="";

function show(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function next(){
step++;

if(step===1) show("s1");

if(step===2){
let v=document.getElementById("loop").value;
document.getElementById("pattern").innerText="You are repeating: "+v;
show("s2");
}

if(step===3) show("s3");

if(step===5) show("s5");

if(step===6){
let a=document.getElementById("action").value;
document.getElementById("finalAction").innerText=a;
show("s6");
}

if(step===7) show("s7");
}

function select(t){
type=t;
let label="", rule="";

if(t==="clarity"){
label="Structural failure: Clarity";
rule="Define one action. Ignore everything else.";
}
if(t==="execution"){
label="Structural failure: Execution";
rule="Start before you feel ready.";
}
if(t==="load"){
label="Structural failure: Load";
rule="Reduce to one thing. Control returns from there.";
}

document.getElementById("label").innerText=label;
document.getElementById("rule").innerText=rule;

step=4;
show("s4");
}
</script>

</body>
</html>
