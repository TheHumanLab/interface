<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>INTERRUPT — The Human Stack</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin:0;
  font-family: Inter, sans-serif;
  background:#0A0A0A;
  color:#EAEAEA;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.screen { display:none; max-width:480px; width:100%; padding:24px; text-align:center;}
.active { display:block; }

h1 { font-size:22px; margin-bottom:10px; }
p { opacity:0.7; font-size:14px; }

button {
  width:100%;
  padding:16px;
  margin-top:12px;
  background:#111;
  border:1px solid #2A2A2A;
  color:#EAEAEA;
  border-radius:6px;
  cursor:pointer;
}
button:hover { background:#151515; }

input {
  width:100%;
  padding:14px;
  margin-top:12px;
  background:transparent;
  border:none;
  border-bottom:1px solid #2A2A2A;
  color:#EAEAEA;
}

.box {
  border:1px solid #2A2A2A;
  padding:16px;
  margin-top:16px;
  text-align:left;
  background:#111;
}
.small { font-size:12px; opacity:0.5; margin-top:10px; }
</style>
</head>

<body>

<div id="app">

<!-- START -->
<div class="screen active" id="s0">
<h1>You’re in a loop.</h1>
<p>This stops now.</p>
<button onclick="next()">Interrupt</button>
</div>

<!-- LOOP -->
<div class="screen" id="s1">
<h1>What are you repeating?</h1>
<input id="loop">
<button onclick="next()">Continue</button>
</div>

<!-- STRUCTURE -->
<div class="screen" id="s2">
<h1>Where is it breaking?</h1>
<button onclick="select('clarity')">I don’t know what to do</button>
<button onclick="select('execution')">I know but I’m not doing it</button>
<button onclick="select('load')">Everything feels too much</button>
</div>

<!-- RULE -->
<div class="screen" id="s3">
<h1 id="label"></h1>
<p id="rule"></p>
<button onclick="next()">Continue</button>
</div>

<!-- ACTION PATH -->
<div class="screen" id="s4">
<h1>Choose one</h1>
<button onclick="path('start')">Start</button>
<button onclick="path('remove')">Remove</button>
<button onclick="path('clarify')">Clarify</button>
</div>

<!-- ACTION -->
<div class="screen" id="s5">
<h1 id="prompt"></h1>
<input id="action">
<button onclick="next()">Commit</button>
</div>

<!-- PROTOCOL -->
<div class="screen" id="s6">
<h1>Your Protocol</h1>
<div class="box" id="protocol"></div>
<button onclick="saveProtocol()">Save</button>
<button onclick="next()">Continue</button>
</div>

<!-- HISTORY -->
<div class="screen" id="s7">
<h1>Your Patterns</h1>
<div id="history"></div>
<p class="small">Return when it happens again.</p>
<button onclick="goStart()">Run Again</button>
</div>

</div>

<script>
let step=0, type="", ruleText="", labelText="", actionType="";

function show(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function next(){
step++;

if(step===1) show("s1");
if(step===2) show("s2");
if(step===4) show("s4");

if(step===6){
let loop=document.getElementById("loop").value;
let action=document.getElementById("action").value;

let protocol = `
WHEN: ${loop}
FAILURE: ${labelText}
RULE: ${ruleText}
ACTION: ${action}
DATE: ${new Date().toLocaleDateString()}
`;

document.getElementById("protocol").innerText = protocol;
show("s6");
}

if(step===7){
loadHistory();
show("s7");
}
}

function select(t){
type=t;

if(t==="clarity"){
labelText="Clarity failure";
ruleText="Define one action.";
}
if(t==="execution"){
labelText="Execution failure";
ruleText="Start immediately.";
}
if(t==="load"){
labelText="Load failure";
ruleText="Reduce to one thing.";
}

document.getElementById("label").innerText=labelText;
document.getElementById("rule").innerText=ruleText;

step=3;
show("s3");
}

function path(p){
let prompt="";
if(p==="start") prompt="What is the smallest start?";
if(p==="remove") prompt="What are you removing?";
if(p==="clarify") prompt="What needs clarity?";

document.getElementById("prompt").innerText=prompt;

step=5;
show("s5");
}

function saveProtocol(){
let existing = JSON.parse(localStorage.getItem("protocols") || "[]");
let current = document.getElementById("protocol").innerText;
existing.push(current);
localStorage.setItem("protocols", JSON.stringify(existing));
}

function loadHistory(){
let existing = JSON.parse(localStorage.getItem("protocols") || "[]");
let container = document.getElementById("history");
container.innerHTML = "";

existing.slice().reverse().forEach(p=>{
let div=document.createElement("div");
div.className="box";
div.innerText=p;
container.appendChild(div);
});
}

function goStart(){
step=0;
show("s0");
}
</script>

</body>
</html>
